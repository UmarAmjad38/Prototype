<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — SkillSwap</title>
  <meta name="description" content="Sign in to your SkillSwap account to share and discover skills." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Nunito', 'sans-serif'] },
          colors: {
            primary: { 50:'#eef2ff', 100:'#e0e7ff', 400:'#818cf8', 500:'#6366f1', 600:'#4f46e5', 700:'#4338ca' }
          },
          borderRadius: { '2xl':'1rem', '3xl':'1.5rem' }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center p-4">

  <div class="w-full max-w-md fade-in">

    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="index.html" class="inline-flex items-center gap-2 text-2xl font-black text-primary-600 tracking-tight">
        <span class="w-9 h-9 bg-primary-600 rounded-2xl flex items-center justify-center text-white text-base font-black">S</span>
        SkillSwap
      </a>
      <p class="mt-2 text-slate-500 text-sm font-medium">Welcome back! Sign in to continue.</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-8">
      <h1 class="text-xl font-black text-slate-800 mb-6">Sign In</h1>

      <!-- Error -->
      <div id="login-error" class="hidden mb-4 px-4 py-3 rounded-2xl bg-red-50 border border-red-200 text-red-700 text-sm font-medium"></div>

      <form id="login-form" class="space-y-4" novalidate>
        <!-- Email -->
        <div>
          <label for="email" class="block text-sm font-bold text-slate-700 mb-1.5">Email address</label>
          <input id="email" name="email" type="email" autocomplete="email" required
            placeholder="you@example.com"
            class="w-full px-4 py-3 rounded-2xl border border-slate-200 bg-slate-50 text-slate-900 text-sm font-medium placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary-400 focus:border-transparent transition" />
        </div>

        <!-- Password -->
        <div>
          <div class="flex items-center justify-between mb-1.5">
            <label for="password" class="text-sm font-bold text-slate-700">Password</label>
          </div>
          <div class="relative">
            <input id="password" name="password" type="password" autocomplete="current-password" required
              placeholder="••••••••"
              class="w-full px-4 py-3 rounded-2xl border border-slate-200 bg-slate-50 text-slate-900 text-sm font-medium placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary-400 focus:border-transparent transition pr-12" />
            <button type="button" id="toggle-pw" tabindex="-1"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition">
              <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" id="login-btn"
          class="w-full mt-2 py-3 px-6 rounded-2xl bg-primary-600 hover:bg-primary-700 text-white font-bold text-sm transition flex items-center justify-center gap-2 disabled:opacity-60">
          <svg id="login-spinner" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
          </svg>
          <span id="login-btn-text">Sign In</span>
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-slate-500 font-medium">
        Don't have an account?
        <a href="register.html" class="text-primary-600 font-bold hover:underline">Create one</a>
      </p>
    </div>

    <p class="text-center text-xs text-slate-400 mt-6 font-medium">
      <a href="index.html" class="hover:text-slate-600 transition">← Back to home</a>
    </p>
  </div>

  <!-- Scripts -->
  <script src="config.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    // Password toggle
    document.getElementById("toggle-pw").addEventListener("click", () => {
      const pw = document.getElementById("password");
      pw.type = pw.type === "password" ? "text" : "password";
    });

    initLoginPage();
  </script>
</body>
</html>
