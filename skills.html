<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Skills — SkillSwap</title>
  <meta name="description" content="Explore hundreds of skills offered by community members on SkillSwap." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Nunito', 'sans-serif'] },
          colors: { primary: { 50:'#eef2ff', 100:'#e0e7ff', 400:'#818cf8', 500:'#6366f1', 600:'#4f46e5', 700:'#4338ca' } }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

<!-- Shared Navbar -->
<div id="navbar-root"></div>

<main class="max-w-6xl mx-auto px-4 sm:px-8 py-10 flex-1 w-full">
  <!-- Header row -->
  <div class="mb-8">
    <h1 class="text-2xl sm:text-3xl font-black text-slate-900 mb-1">Browse Skills</h1>
    <p class="text-slate-500 text-sm font-medium">Discover skills shared by community members.</p>
  </div>

  <!-- Search + Filters -->
  <div class="flex flex-col sm:flex-row gap-4 mb-8">
    <div class="relative flex-1">
      <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <input id="search-input" type="search" placeholder="Search skills…"
        class="w-full pl-11 pr-4 py-3.5 rounded-2xl border border-slate-200 bg-white text-sm font-medium text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary-400 transition shadow-sm" />
    </div>

    <!-- Custom Category Dropdown -->
    <div class="custom-select min-w-[180px]" id="cat-dropdown">
      <div class="select-trigger" onclick="toggleDropdown('cat-dropdown')">
        <span class="selected-text">All Categories</span>
        <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/></svg>
      </div>
      <div class="select-options">
        <div class="select-option" onclick="selectOption('cat-dropdown', '', 'All Categories')">All Categories</div>
        <!-- API Options Injected Here -->
      </div>
    </div>

    <!-- Custom Level Dropdown -->
    <div class="custom-select min-w-[150px]" id="level-dropdown">
      <div class="select-trigger" onclick="toggleDropdown('level-dropdown')">
        <span class="selected-text">All Levels</span>
        <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/></svg>
      </div>
      <div class="select-options">
        <div class="select-option" onclick="selectOption('level-dropdown', '', 'All Levels')">All Levels</div>
        <div class="select-option" onclick="selectOption('level-dropdown', 'beginner', 'Beginner')">Beginner</div>
        <div class="select-option" onclick="selectOption('level-dropdown', 'intermediate', 'Intermediate')">Intermediate</div>
        <div class="select-option" onclick="selectOption('level-dropdown', 'expert', 'Expert')">Expert</div>
      </div>
    </div>
  </div>

  <!-- Results count -->
  <p id="results-count" class="text-xs font-bold text-slate-400 mb-5"></p>

  <!-- Grid -->
  <div id="skills-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-5">
    <!-- Skeleton loaders -->
    <div class="bg-white rounded-3xl border border-slate-100 p-6 animate-pulse"><div class="w-full h-32 bg-slate-100 rounded-2xl mb-4"></div><div class="h-4 bg-slate-100 rounded-full mb-2 w-3/4"></div><div class="h-3 bg-slate-100 rounded-full w-1/2"></div></div>
    <div class="bg-white rounded-3xl border border-slate-100 p-6 animate-pulse"><div class="w-full h-32 bg-slate-100 rounded-2xl mb-4"></div><div class="h-4 bg-slate-100 rounded-full mb-2 w-3/4"></div><div class="h-3 bg-slate-100 rounded-full w-1/2"></div></div>
    <div class="bg-white rounded-3xl border border-slate-100 p-6 animate-pulse hidden lg:block"><div class="w-full h-32 bg-slate-100 rounded-2xl mb-4"></div><div class="h-4 bg-slate-100 rounded-full mb-2 w-3/4"></div><div class="h-3 bg-slate-100 rounded-full w-1/2"></div></div>
  </div>

  <!-- No results -->
  <div id="no-results" class="hidden text-center py-16">
    <div class="text-4xl mb-3">🔍</div>
    <p class="text-slate-500 font-bold text-sm">No skills found matching your filters.</p>
    <button onclick="resetFilters()" class="mt-4 text-sm font-bold text-primary-600 hover:underline">Clear filters</button>
  </div>

  <!-- Pagination -->
  <div id="pagination" class="flex items-center justify-center gap-2 mt-10 hidden"></div>
</main>
</main>

<div id="footer-root"></div>

<script src="config.js?v=3"></script>
<script src="assets/js/utils.js?v=3"></script>
<script src="assets/js/api.js?v=3"></script>
<script src="assets/js/navbar.js?v=3"></script>
<script src="assets/js/footer.js?v=3"></script>
<script>
  renderNavbar("public");
  renderFooter();
  let currentPage = 1, totalPages = 1;
  let searchVal = "", catVal = "", levelVal = "";

  // Pre-fill search from URL param
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get("cat")) catVal = urlParams.get("cat");
  if (urlParams.get("search")) searchVal = urlParams.get("search");

  // custom dropdown logic
  function toggleDropdown(id) {
    const el = document.getElementById(id);
    const options = el.querySelector(".select-options");
    const trigger = el.querySelector(".select-trigger");
    const isOpen = options.classList.contains("show");
    
    // Close all
    document.querySelectorAll(".select-options").forEach(o => o.classList.remove("show"));
    document.querySelectorAll(".select-trigger").forEach(t => t.classList.remove("active"));
    
    if (!isOpen) { 
      options.classList.add("show");
      trigger.classList.add("active");
    }
  }

  function selectOption(dropdownId, val, text) {
    const el = document.getElementById(dropdownId);
    el.querySelector(".selected-text").textContent = text;
    el.querySelector(".select-options").classList.remove("show");
    el.querySelector(".select-trigger").classList.remove("active");
    
    if (dropdownId === "cat-dropdown") catVal = val;
    else levelVal = val;
    
    currentPage = 1;
    loadSkills();
  }

  // Close on outside click
  window.addEventListener("click", e => {
    if (!e.target.closest(".custom-select")) {
      document.querySelectorAll(".select-options").forEach(o => o.classList.remove("show"));
      document.querySelectorAll(".select-trigger").forEach(t => t.classList.remove("active"));
    }
  });

  async function loadCats() {
    try {
      const res = await API.getCategories();
      const cats = res?.data || [];
      const options = document.querySelector("#cat-dropdown .select-options");
      let html = `<div class="select-option" onclick="selectOption('cat-dropdown', '', 'All Categories')">All Categories</div>`;
      html += cats.map(c => {
        const name = c.attributes?.name || c.name;
        return `<div class="select-option" onclick="selectOption('cat-dropdown', '${name}', '${name}')">${name}</div>`;
      }).join("");
      options.innerHTML = html;
      
      if (catVal) {
        document.querySelector("#cat-dropdown .selected-text").textContent = catVal;
      }
    } catch { /* ignore */ }
  }

  async function loadSkills() {
    const grid   = document.getElementById("skills-grid");
    const noRes  = document.getElementById("no-results");
    const count  = document.getElementById("results-count");
    grid.innerHTML = `<div class="col-span-3 flex justify-center py-12"><div class="w-7 h-7 border-2 border-primary-400 border-t-transparent rounded-full animate-spin"></div></div>`;
    noRes.classList.add("hidden");

    try {
      const res = await API.getSkills({
        status: "approved",
        search: searchVal,
        category: catVal,
        level: levelVal, // Now API handles level if implemented, if not we can add it to api.js
        page: currentPage,
        limit: 9,
      });
      const skills = res?.data || [];
      const meta = res?.meta?.pagination || {};
      totalPages = meta.pageCount || 1;
      count.textContent = `${meta.total || skills.length} skill${(meta.total || skills.length) !== 1 ? "s" : ""} found`;

      if (!skills.length) {
        grid.innerHTML = "";
        noRes.classList.remove("hidden");
        return;
      }

      grid.innerHTML = skills.map(s => {
        const a = s.attributes || s;
        const img = a.imageUrls?.[0] || "";
        const cat = a.skillCategory?.name || a.skillCategory?.attributes?.name || "General";
        const providerName = a.owner?.username || a.owner?.attributes?.username || "Anonymous";
        return `
          <a href="skill-detail.html?id=${s.id}" class="skill-card bg-white border border-slate-100 rounded-3xl overflow-hidden flex flex-col">
            <div class="w-full h-36 bg-slate-100 overflow-hidden shrink-0">
              ${img
                ? `<img src="${img}" alt="${a.title}" class="w-full h-full object-cover"/>`
                : `<div class="w-full h-full flex items-center justify-center text-5xl">🎓</div>`}
            </div>
            <div class="p-5 flex flex-col flex-1">
              <div class="flex items-center gap-2 mb-2 flex-wrap">
                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold bg-primary-50 text-primary-700">${cat}</span>
                ${levelBadge(a.level)}
              </div>
              <h2 class="text-sm font-black text-slate-800 mb-1">${a.title}</h2>
              <p class="text-xs text-slate-500 font-medium line-clamp-2 mb-4 flex-1">${a.description || ""}</p>
              <div class="flex items-center gap-2 mt-auto">
                <div class="w-6 h-6 rounded-full bg-primary-100 flex items-center justify-center text-xs font-black text-primary-600">${getInitials(providerName)}</div>
                <span class="text-xs font-bold text-slate-500">${providerName}</span>
              </div>
            </div>
          </a>`;
      }).join("");

      renderPagination();
    } catch (err) {
      grid.innerHTML = `<div class="col-span-3 text-center py-8 text-slate-400 font-medium text-sm">Failed to load skills. Please check your Strapi connection.</div>`;
    }
  }

  function renderPagination() {
    const pag = document.getElementById("pagination");
    if (totalPages <= 1) { pag.classList.add("hidden"); return; }
    pag.classList.remove("hidden");
    let html = "";
    for (let i = 1; i <= totalPages; i++) {
      html += `<button onclick="goToPage(${i})"
        class="w-9 h-9 rounded-xl text-sm font-bold transition ${i === currentPage ? "bg-primary-600 text-white" : "bg-white border border-slate-200 text-slate-600 hover:border-primary-300"}">${i}</button>`;
    }
    pag.innerHTML = html;
  }

  function goToPage(p) { currentPage = p; loadSkills(); window.scrollTo({ top: 0, behavior: "smooth" }); }

  function resetFilters() {
    searchVal = catVal = levelVal = "";
    document.getElementById("search-input").value = "";
    document.querySelector("#cat-dropdown .selected-text").textContent = "All Categories";
    document.querySelector("#level-dropdown .selected-text").textContent = "All Levels";
    currentPage = 1; loadSkills();
  }

  // Search debounce
  document.getElementById("search-input").addEventListener("input", debounce(e => {
    searchVal = e.target.value.trim(); currentPage = 1; loadSkills();
  }, 400));

  // Pre-fill search input
  if (searchVal) document.getElementById("search-input").value = searchVal;

  loadCats();
  loadSkills();
</script>
</body>
</html>
