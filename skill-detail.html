<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skill Detail — SkillSwap</title>
  <meta name="description" content="View skill details on SkillSwap." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Nunito', 'sans-serif'] },
          colors: { primary: { 50:'#eef2ff', 100:'#e0e7ff', 400:'#818cf8', 500:'#6366f1', 600:'#4f46e5', 700:'#4338ca' } }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

<!-- Shared Navbar -->
<div id="navbar-root"></div>

<main class="max-w-4xl mx-auto px-4 sm:px-6 py-10">
  <!-- Loading skeleton -->
  <div id="skill-skeleton" class="animate-pulse space-y-4">
    <div class="w-full h-64 bg-slate-100 rounded-3xl"></div>
    <div class="h-6 bg-slate-100 rounded-full w-1/2"></div>
    <div class="h-4 bg-slate-100 rounded-full w-1/3"></div>
    <div class="h-4 bg-slate-100 rounded-full w-full"></div>
    <div class="h-4 bg-slate-100 rounded-full w-5/6"></div>
  </div>

  <!-- Content (hidden until loaded) -->
  <div id="skill-content" class="hidden fade-in">
    <!-- Hero image -->
    <div id="skill-image-wrap" class="w-full h-64 sm:h-80 bg-slate-100 rounded-3xl overflow-hidden mb-7"></div>

    <div class="grid lg:grid-cols-3 gap-7">
      <!-- Left: main info -->
      <div class="lg:col-span-2 space-y-6">
        <!-- Badges -->
        <div id="skill-badges" class="flex flex-wrap gap-2"></div>
        <h1 id="skill-title" class="text-2xl sm:text-3xl font-black text-slate-900 leading-tight"></h1>
        <p id="skill-description" class="text-base text-slate-600 font-medium leading-relaxed prose"></p>

        <!-- Meta info -->
        <div class="grid sm:grid-cols-2 gap-4 pt-2">
          <div class="bg-white border border-slate-100 rounded-2xl p-4 flex items-center gap-3">
            <div class="w-9 h-9 bg-slate-50 rounded-xl flex items-center justify-center text-lg">📍</div>
            <div>
              <p class="text-xs font-bold text-slate-400 uppercase tracking-wide">Location</p>
              <p id="skill-location" class="text-sm font-bold text-slate-800"></p>
            </div>
          </div>
          <div class="bg-white border border-slate-100 rounded-2xl p-4 flex items-center gap-3">
            <div class="w-9 h-9 bg-slate-50 rounded-xl flex items-center justify-center text-lg">📅</div>
            <div>
              <p class="text-xs font-bold text-slate-400 uppercase tracking-wide">Availability</p>
              <p id="skill-availability" class="text-sm font-bold text-slate-800"></p>
            </div>
          </div>
        </div>

        <!-- Additional images -->
        <div id="skill-gallery" class="flex gap-3 flex-wrap"></div>
      </div>

      <!-- Right: provider card + CTA -->
      <div class="space-y-4">
        <!-- Provider card -->
        <div class="bg-white border border-slate-100 rounded-3xl p-6">
          <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Offered by</p>
          <div class="flex items-center gap-3 mb-5">
            <div id="provider-Avatar" class="w-11 h-11 rounded-2xl bg-primary-100 flex items-center justify-center text-sm font-black text-primary-600 shrink-0"></div>
            <div>
              <p id="provider-name" class="text-sm font-black text-slate-800"></p>
              <p id="provider-email" class="text-xs text-slate-400 font-medium"></p>
            </div>
          </div>
          <a href="login.html" id="contact-btn"
            class="w-full flex items-center justify-center gap-2 py-3 px-4 rounded-2xl bg-primary-600 hover:bg-primary-700 text-white text-sm font-bold transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            Get in Touch
          </a>
          <p class="text-xs text-center text-slate-400 font-medium mt-3">Sign in to contact this member</p>
        </div>

        <!-- Posted on -->
        <div class="bg-white border border-slate-100 rounded-2xl p-4">
          <p class="text-xs font-bold text-slate-400 uppercase tracking-wide mb-1">Listed on</p>
          <p id="skill-date" class="text-sm font-bold text-slate-800"></p>
        </div>
      </div>
    </div>
  </div>

  <!-- Error state -->
  <div id="skill-error" class="hidden text-center py-20">
    <div class="text-4xl mb-3">😕</div>
    <p class="text-slate-500 font-bold">Skill not found or no longer available.</p>
    <a href="skills.html" class="inline-block mt-4 text-sm font-bold text-primary-600 hover:underline">← Browse all skills</a>
  </div>
</main>

<div id="footer-root"></div>

<script src="config.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/navbar.js"></script>
<script src="assets/js/footer.js"></script>
<script>
  renderNavbar("public");
  renderFooter();
  const skillId = new URLSearchParams(window.location.search).get("id");

  async function loadSkill() {
    if (!skillId) { showError(); return; }
    try {
      const res = await API.getSkillById(skillId);
      const s = res.data;
      if (!s) { showError(); return; }
      const a = s.attributes || s;
      const provider = a.provider?.data?.attributes || a.provider || {};
      const cat = a.category?.data?.attributes?.name || a.category?.name || "General";
      const images = a.images?.data || [];

      // title + meta
      document.title = `${a.title} — SkillSwap`;
      document.getElementById("skill-title").textContent = a.title;
      document.getElementById("skill-description").textContent = a.description || "No description provided.";
      document.getElementById("skill-location").textContent = a.location || "Remote / Online";
      document.getElementById("skill-availability").textContent = a.availability || "Flexible";
      document.getElementById("skill-date").textContent = formatDate(a.createdAt || s.createdAt);

      // Badges
      document.getElementById("skill-badges").innerHTML =
        `<span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-primary-50 text-primary-700">${cat}</span>` +
        levelBadge(a.level);

      // Image
      const imgWrap = document.getElementById("skill-image-wrap");
      const mainImg = images[0]?.attributes?.url || images[0]?.url || "";
      imgWrap.innerHTML = mainImg
        ? `<img src="${mainImg}" alt="${a.title}" class="w-full h-full object-cover"/>`
        : `<div class="w-full h-full flex items-center justify-center text-7xl">🎓</div>`;

      // Additional images
      if (images.length > 1) {
        const gallery = document.getElementById("skill-gallery");
        gallery.innerHTML = images.slice(1).map(img => {
          const url = img.attributes?.url || img.url || "";
          return `<img src="${url}" class="w-20 h-20 rounded-2xl object-cover border border-slate-200" alt=""/>`;
        }).join("");
      }

      // Provider
      document.getElementById("provider-Avatar").textContent = getInitials(provider.username || "?");
      document.getElementById("provider-name").textContent = provider.username || "Anonymous";
      document.getElementById("provider-email").textContent = provider.email ? "Registered member" : "";

      // Show content
      document.getElementById("skill-skeleton").classList.add("hidden");
      document.getElementById("skill-content").classList.remove("hidden");
    } catch {
      showError();
    }
  }

  function showError() {
    document.getElementById("skill-skeleton").classList.add("hidden");
    document.getElementById("skill-error").classList.remove("hidden");
  }

  loadSkill();
</script>
</body>
</html>
