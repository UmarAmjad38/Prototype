<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — SkillSwap</title>
  <meta name="description" content="Create your free SkillSwap account and start sharing your skills with the world." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Nunito', 'sans-serif'] },
          colors: {
            primary: { 50:'#eef2ff', 100:'#e0e7ff', 400:'#818cf8', 500:'#6366f1', 600:'#4f46e5', 700:'#4338ca' }
          },
          borderRadius: { '2xl':'1rem', '3xl':'1.5rem' }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

  <!-- Shared Navbar -->
  <div id="navbar-root"></div>

  <main class="flex-1 flex items-center justify-center p-4 py-12">
    <div class="w-full max-w-md fade-in">
      <!-- Card -->
      <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-8 sm:p-10">
        <div class="text-center mb-8">
          <h1 class="text-2xl font-black text-slate-900 tracking-tight">Create Account</h1>
          <p class="mt-2 text-slate-500 text-sm font-medium">Join thousands sharing their skills.</p>
        </div>

        <!-- Error -->
        <div id="register-error" class="hidden mb-4 px-4 py-3 rounded-2xl bg-red-50 border border-red-200 text-red-700 text-sm font-medium"></div>

        <form id="register-form" class="space-y-4" novalidate>
          <!-- Username -->
          <div>
            <label for="username" class="block text-sm font-bold text-slate-700 mb-1.5">Full name</label>
            <input id="username" name="username" type="text" autocomplete="name" required
              placeholder="Alex Johnson"
              class="w-full px-4 py-3 rounded-2xl border border-slate-200 bg-white text-slate-900 text-sm font-medium placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary-400 transition" />
          </div>

          <!-- Email -->
          <div>
            <label for="email" class="block text-sm font-bold text-slate-700 mb-1.5">Email address</label>
            <input id="email" name="email" type="email" autocomplete="email" required
              placeholder="you@example.com"
              class="w-full px-4 py-3 rounded-2xl border border-slate-200 bg-white text-slate-900 text-sm font-medium placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary-400 transition" />
          </div>

          <!-- Password -->
          <div>
            <label for="password" class="block text-sm font-bold text-slate-700 mb-1.5">Password</label>
            <div class="relative">
              <input id="password" name="password" type="password" autocomplete="new-password" required
                placeholder="Min. 6 characters"
                class="w-full px-4 py-3 rounded-2xl border border-slate-200 bg-white text-slate-900 text-sm font-medium placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary-400 transition pr-12" />
              <button type="button" id="toggle-pw" tabindex="-1"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Confirm Password -->
          <div>
            <label for="confirm_password" class="block text-sm font-bold text-slate-700 mb-1.5">Confirm password</label>
            <input id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" required
              placeholder="••••••••"
              class="w-full px-4 py-3 rounded-2xl border border-slate-200 bg-white text-slate-900 text-sm font-medium placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary-400 transition" />
          </div>


          <!-- Submit -->
          <button type="submit"
            class="w-full mt-2 py-3.5 px-6 rounded-2xl bg-primary-600 hover:bg-primary-700 text-white font-bold text-sm transition flex items-center justify-center gap-2 shadow-xl shadow-primary-500/10 active:scale-[0.98] disabled:opacity-70">
            <svg id="register-spinner" class="hidden w-4 h-4 animate-spin text-white" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span id="register-btn-text">Create Account</span>
          </button>
        </form>

        <p class="mt-8 text-center text-sm text-slate-500 font-medium">
          Already have an account?
          <a href="login.html" class="text-primary-600 font-black hover:underline">Sign in</a>
        </p>
      </div>
    </div>
  </main>

  <!-- Shared Footer -->
  <div id="footer-root"></div>

  <!-- Scripts -->
  <script src="config.js?v=3"></script>
  <script src="assets/js/utils.js?v=3"></script>
  <script src="assets/js/api.js?v=3"></script>
  <script src="assets/js/auth.js?v=3"></script>
  <script src="assets/js/navbar.js?v=3"></script>
  <script src="assets/js/footer.js?v=3"></script>
  <script>
    document.getElementById("toggle-pw").addEventListener("click", () => {
      const pw = document.getElementById("password");
      pw.type = pw.type === "password" ? "text" : "password";
    });

    renderNavbar("public");
    renderFooter();
    initRegisterPage();
  </script>
</body>
</html>
